<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çevrimdışı - Aydın Aydemir</title>
    <style>
        /* Çevrimdışı sayfasının güvenilir olması için stiller doğrudan buraya gömüldü */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; /* Basit sistem fontları */
            background-color: #f8f9fa; /* Açık gri arka plan */
            color: #343a40; /* Koyu gri metin */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            flex-direction: column; /* İçeriği dikey sırala */
        }
        .container {
            background-color: #ffffff; /* Beyaz kart */
            padding: 30px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 500px;
        }
        h1 {
            color: #dc3545; /* Kırmızımsı bir başlık rengi */
            margin-bottom: 15px;
            font-size: 1.8em;
        }
        p {
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        img {
            max-width: 100px; /* İkon boyutunu ayarla */
            margin-bottom: 20px;
            opacity: 0.7;
        }
        small {
            margin-top: 20px;
            color: #6c757d; /* Daha soluk gri */
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/images/icons/icon-192x192.png" alt="Çevrimdışı İkonu">

        <h1>Bağlantı Sorunu</h1>
        <p>İnternet bağlantınız yok gibi görünüyor veya sunucuya ulaşılamıyor.</p>
        <p>Lütfen bağlantınızı kontrol edip sayfayı yeniden yüklemeyi deneyin.</p>
        <hr style="border: none; border-top: 1px solid #eee; margin: 20px 0;">
        <small>Connection Problem: It seems you are offline or the server cannot be reached. Please check your connection and try reloading the page.</small>
    </div>
</body>
</html>
